<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>WTP v6.0 Crystal</title>
  <style>
    :root {
      --a1: #d946ef; --a2: #8b5cf6; --a3: #06b6d4;
      --bg: #020205; --glass: rgba(255,255,255,0.06);
      --text: #f8fafc; --muted: #94a3b8;
      --tr: 0.4s cubic-bezier(0.4, 0, 0.1, 1);
    }
    body {
      width: 320px; margin: 0; padding: 24px;
      background: var(--bg); color: var(--text);
      font-family: 'Inter', sans-serif; overflow: hidden;
      display: flex; flex-direction: column; gap: 24px;
      border: 1px solid rgba(255,255,255,0.15);
      position: relative;
    }
    /* Liquid v6 Ambient Preview */
    body::before {
      content: ''; position: absolute; inset: -50px;
      background: radial-gradient(circle at 10% 10%, rgba(217, 70, 239, 0.25), transparent 50%),
                  radial-gradient(circle at 90% 90%, rgba(6, 182, 212, 0.25), transparent 50%);
      z-index: -1; filter: blur(30px);
    }
    
    .header { display: flex; justify-content: space-between; align-items: center; }
    .header h1 {
      font-size: 19px; margin: 0; font-weight: 900; letter-spacing: -0.5px;
      background: linear-gradient(135deg, var(--a1), var(--a3));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      filter: drop-shadow(0 0 8px rgba(217, 70, 239, 0.3));
    }
    
    .switch-container {
      display: flex; justify-content: space-between; align-items: center;
      background: var(--glass); padding: 14px 18px; border-radius: 20px;
      border: 1px solid rgba(255,255,255,0.1);
      backdrop-filter: blur(20px);
      box-shadow: inset 0 1px 1px rgba(255,255,255,0.1);
    }
    .switch { position: relative; width: 48px; height: 26px; }
    .switch input { opacity: 0; width: 0; height: 0; }
    .slider {
      position: absolute; cursor: pointer; inset: 0;
      background: rgba(255,255,255,0.1); border-radius: 34px;
      transition: var(--tr); border: 1.5px solid rgba(255,255,255,0.1);
    }
    .slider::before {
      content: ""; position: absolute; height: 18px; width: 18px;
      left: 3px; bottom: 3px; background: white; border-radius: 50%;
      transition: var(--tr); box-shadow: 0 4px 8px rgba(0,0,0,0.4);
    }
    input:checked + .slider { background: linear-gradient(135deg, var(--a1), var(--a2)); border-color: transparent; }
    input:checked + .slider::before { transform: translateX(22px); }

    .section-title { font-size: 11px; font-weight: 800; color: var(--muted); text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 12px; }
    
    .themes { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
    .theme-btn {
      aspect-ratio: 1; border-radius: 16px; border: 2.5px solid transparent;
      cursor: pointer; transition: var(--tr); overflow: hidden;
      position: relative; background: var(--glass);
      backdrop-filter: blur(10px);
    }
    .theme-btn::after {
      content: ''; position: absolute; inset: 0;
      background: linear-gradient(135deg, var(--c1), var(--c2));
      opacity: 0.85; transition: var(--tr);
    }
    .theme-btn.active { border-color: white; box-shadow: 0 0 25px var(--c1); transform: scale(1.08); z-index: 2; }
    .theme-btn:hover { transform: scale(1.1); filter: brightness(1.2); }
    
    .cyberpunk { --c1: #d946ef; --c2: #8b5cf6; }
    .matrix    { --c1: #22c55e; --c2: #16a34a; }
    .ocean     { --c1: #0ea5e9; --c2: #06b6d4; }
    .sunset    { --c1: #f43f5e; --c2: #fb923c; }
    .neon      { --c1: #facc15; --c2: #a855f7; }

    .control-group { 
      background: var(--glass); padding: 18px; border-radius: 20px; 
      border: 1px solid rgba(255,255,255,0.1); backdrop-filter: blur(20px);
      box-shadow: inset 0 1px 1px rgba(255,255,255,0.1);
    }
    
    input[type=range] {
      width: 100%; height: 5px; background: rgba(255,255,255,0.15);
      border-radius: 5px; appearance: none; outline: none; margin: 12px 0;
    }
    input[type=range]::-webkit-slider-thumb {
      appearance: none; width: 16px; height: 16px;
      background: white; border-radius: 50%; cursor: pointer;
      box-shadow: 0 0 15px var(--a1); border: 2px solid var(--a1);
    }

    button.action {
      background: linear-gradient(135deg, var(--a1), var(--a2));
      color: white; border: none; padding: 16px; border-radius: 18px;
      font-weight: 800; cursor: pointer; transition: var(--tr);
      text-transform: uppercase; letter-spacing: 1px; font-size: 12px;
      box-shadow: 0 10px 30px rgba(217, 70, 239, 0.4);
    }
    button.action:hover { transform: translateY(-3px) scale(1.02); box-shadow: 0 15px 40px rgba(217, 70, 239, 0.6); }
    button.action:active { transform: translateY(0); }

    .footer { font-size: 10px; color: var(--muted); text-align: center; margin-top: 10px; opacity: 0.6; font-weight: 600; }
  </style>
</head>
<body>
  <div class="header">
    <h1>WebTransformer Pro</h1>
    <div class="switch">
      <label class="switch">
        <input type="checkbox" id="master-toggle">
        <span class="slider"></span>
      </label>
    </div>
  </div>

  <div class="controls">
    <div>
      <div class="section-title">V6.0 Liquid Material</div>
      <div class="themes">
        <div class="theme-btn cyberpunk active" data-theme="cyberpunk" title="Cyberpunk"></div>
        <div class="theme-btn matrix" data-theme="matrix" title="Matrix"></div>
        <div class="theme-btn ocean" data-theme="ocean" title="Ocean"></div>
        <div class="theme-btn sunset" data-theme="sunset" title="Sunset"></div>
        <div class="theme-btn neon" data-theme="neon" title="Neon"></div>
      </div>
    </div>

    <div class="control-group">
      <div class="section-title">Crystal Intensity</div>
      <input type="range" id="intensity" min="1" max="3" step="1" value="3">
    </div>

    <div class="switch-container">
      <div style="font-weight: 700; font-size: 14px; letter-spacing: -0.5px;">Glow Particles</div>
      <label class="switch">
        <input type="checkbox" id="particles-toggle" checked>
        <span class="slider"></span>
      </label>
    </div>

    <button class="action" id="whitelist-btn">Whitelist This Site</button>
  </div>

  <div class="footer">💎 v6.0 — Liquid Glass Edition</div>

  <script src="popup.js"></script>
</body>
</html>
