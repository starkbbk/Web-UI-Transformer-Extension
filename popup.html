<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>WTP v10.0 Pure Water</title>
  <style>
    :root {
      --bg: #000000; --glass: rgba(255,255,255,0.08);
      --text: #ffffff; --muted: #cbd5e1;
      --tr: 0.5s cubic-bezier(0.19, 1, 0.22, 1);
    }
    body {
      width: 320px; margin: 0; padding: 24px;
      background: var(--bg); color: var(--text);
      font-family: 'Inter', sans-serif; overflow: hidden;
      display: flex; flex-direction: column; gap: 24px;
      border: 1px solid rgba(255,255,255,0.2);
    }
    /* NO TEXT SHADOW AS REQUESTED */
    * { text-shadow: none !important; }
    
    .header { display: flex; justify-content: space-between; align-items: center; }
    .header h1 {
      font-size: 21px; margin: 0; font-weight: 800; letter-spacing: -2px;
      color: #ffffff;
    }
    
    .switch-container {
      display: flex; justify-content: space-between; align-items: center;
      background: var(--glass); padding: 18px 22px; border-radius: 48px;
      border: 1px solid rgba(255,255,255,0.15);
      backdrop-filter: blur(32px);
    }
    .switch { position: relative; width: 52px; height: 28px; }
    .switch input { opacity: 0; width: 0; height: 0; }
    .slider {
      position: absolute; cursor: pointer; inset: 0;
      background: rgba(255,255,255,0.1); border-radius: 34px;
      transition: var(--tr); border: 1.5px solid rgba(255,255,255,0.2);
    }
    .slider::before {
      content: ""; position: absolute; height: 18px; width: 18px;
      left: 4px; bottom: 4px; background: white; border-radius: 50%;
      transition: var(--tr);
    }
    input:checked + .slider { background: #ffffff; border-color: transparent; }
    input:checked + .slider::before { transform: translateX(24px); background: #000000; }

    .section-title { font-size: 11px; font-weight: 800; color: var(--muted); text-transform: uppercase; letter-spacing: 3px; margin-bottom: 12px; opacity: 0.9; }
    
    .control-group { 
      background: var(--glass); padding: 22px; border-radius: 48px; 
      border: 1px solid rgba(255,255,255,0.15); backdrop-filter: blur(40px);
    }
    
    input[type=range] {
      width: 100%; height: 7px; background: rgba(255,255,255,0.15);
      border-radius: 5px; appearance: none; outline: none; margin: 14px 0;
    }
    input[type=range]::-webkit-slider-thumb {
      appearance: none; width: 22px; height: 22px;
      background: white; border-radius: 50%; cursor: pointer;
      border: 4px solid #000;
    }

    button.action {
      background: #ffffff;
      color: #000000; border: none; padding: 22px; border-radius: 48px;
      font-weight: 800; cursor: pointer; transition: var(--tr);
      text-transform: uppercase; letter-spacing: 2px; font-size: 11.5px;
    }
    button.action:hover { transform: translateY(-5px) scale(1.05); background: #f0f0f0; }

    .footer { font-size: 10.5px; color: var(--muted); text-align: center; margin-top: 12px; opacity: 0.7; font-weight: 800; letter-spacing: 1.5px; }
  </style>
</head>
<body>
  <div class="header">
    <h1>WebTransformer Pro</h1>
    <div class="switch">
      <label class="switch">
        <input type="checkbox" id="master-toggle">
        <span class="slider"></span>
      </label>
    </div>
  </div>

  <div class="controls">
    <div class="control-group">
      <div class="section-title">Liquid Refraction</div>
      <input type="range" id="intensity" min="1" max="3" step="1" value="3">
    </div>

    <div class="switch-container">
      <div style="font-weight: 800; font-size: 14.5px; letter-spacing: -1px;">Clear Mode</div>
      <label class="switch">
        <input type="checkbox" id="particles-toggle" checked>
        <span class="slider"></span>
      </label>
    </div>

    <button class="action" id="whitelist-btn">Enable Liquid All Sites</button>
  </div>

  <div class="footer">💧 v10.0 — Pure Water Edition</div>

  <script src="popup.js"></script>
</body>
</html>
